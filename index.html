        /* 1페이지: 날렵한 선 드로잉 애니메이션 (두께 1.8) */
        @keyframes drawLineInfinite {
            0% { stroke-dashoffset: 240; opacity: 0; }
            10% { opacity: 1; }
            50% { stroke-dashoffset: 0; opacity: 1; }
            90% { opacity: 1; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }
        .animate-draw-refined {
            stroke-dasharray: 240;
            stroke-dashoffset: 240;
            animation: drawLineInfinite 4s ease-in-out infinite;
        }

        /* 9페이지: 하트 심장 박동 애니메이션 */
        @keyframes heartBeatPulse {
            0% { transform: scale(1); }
            15% { transform: scale(1.3); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            70% { transform: scale(1); }
        }
        .animate-heart-pulse {
            animation: heartBeatPulse 1.2s ease-in-out infinite;
            display: inline-block;
            transform-origin: center;
        }

        /* 부드러운 슬라이드 전환 효과 */
        .fade-enter { opacity: 0; transform: translateY(10px); }
        .fade-enter-active { opacity: 1; transform: translateY(0); transition: all 500ms; }

        /* 커스텀 툴팁 */
        .recharts-default-tooltip {

                                    <RetroItem text="수정 이력 관리를 통한 품질 유지" color="green" />
                                </div>
                            </section>
                            <section>
                                <h4 className="font-bold text-red-700 mb-6 flex items-center gap-2"><div className="w-6 h-6 rounded-full bg-red-100 flex items-center justify-center text-xs font-bold">!</div> 아쉬운 점</h4>
                                <div className="space-y-3">
                                    <RetroItem text="초기 변형 케이스 협의 부족" color="red" />
                                    <RetroItem text="확정 후 반복된 스펙 변경" color="red" />
                                    <RetroItem text="디자인 공유 프로세스 부재" color="red" />
                                </div>
                            </section>
                        </div>
                    )
                },
                // 9. 엔딩
                {
                    title: "",
                    subtitle: "End of Presentation",
                    content: (
                        <div className="flex flex-col items-center justify-center h-full text-center">
                            <div className="w-32 h-32 bg-red-50 rounded-full text-red-400 mb-10 border border-red-100 shadow-sm flex items-center justify-center">
                                <span className="animate-heart-pulse">
                                    <LucideIcon name="heart" size={64} isFill={true} />
                                </span>
                            </div>
                            <h1 className="text-6xl font-black text-slate-800 mb-10 tracking-tighter">감사합니다</h1>
                            <div className="mt-8 pt-10 border-t w-full max-w-sm flex flex-col gap-2">
                                <p className="text-sm font-bold text-slate-700 tracking-wide">신한 SOL글로벌 고도화 프로젝트 수행 리뷰</p>
                                <p className="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em]">Publisher Project Performance Review</p>
                            </div>
                        </div>
                    )
                }
            ];

            const next = () => setCurrentSlide((prev) => (prev + 1) % slides.length);
            const prev = () => setCurrentSlide((prev) => (prev - 1 + slides.length) % slides.length);

            return (
                <div className="w-full max-w-5xl bg-white rounded-[2.5rem] shadow-[0_35px_60px_-15px_rgba(0,0,0,0.1)] overflow-hidden flex flex-col min-h-[740px] border border-slate-100 relative">
                    {/* Header */}
                    <div className="bg-white/80 backdrop-blur-md border-b p-8 flex justify-between items-center shrink-0">
                        <div className={slides[currentSlide].title === "" ? "opacity-0" : "opacity-100 transition-opacity"}>
                            <h3 className="font-black text-xl text-slate-800 tracking-tight">{slides[currentSlide].title}</h3>
                            <p className="text-[10px] text-slate-400 font-black uppercase tracking-[0.2em] mt-1">{slides[currentSlide].subtitle}</p>
                        </div>
                        <div className="flex gap-4">
                            <button onClick={prev} className="p-3 bg-white border border-slate-100 hover:bg-slate-50 rounded-2xl transition-all shadow-sm text-slate-500">
                                <LucideIcon name="chevron-left" size={22} />
                            </button>
                            <div className="flex items-center text-sm font-black bg-slate-50 px-6 rounded-2xl border border-slate-100 shadow-inner">
                                {currentSlide + 1} <span className="mx-2 text-slate-300">/</span> {slides.length}
                            </div>
                            <button onClick={next} className="p-3 bg-slate-800 text-white hover:bg-slate-900 rounded-2xl transition-all shadow-md">
                                <LucideIcon name="chevron-right" size={22} />
                            </button>
                        </div>
                    </div>

                    {/* Content */}
                    <div className="flex-grow p-10 md:p-16 overflow-y-auto">
                        <div className="h-full">
                            {slides[currentSlide].content}
                        </div>
                    </div>

                    {/* Progress */}
                    <div className="w-full h-1.5 bg-slate-100 flex">
                        {slides.map((_, idx) => (
                            <div key={idx} className={`flex-grow h-full transition-all duration-700 ${idx <= currentSlide ? 'bg-slate-800' : 'bg-transparent'}`} />
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
